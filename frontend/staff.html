<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Staff Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; padding: 16px; background:#0b0c0f; color:#eee; }
    .wrap { max-width: 980px; margin: 20px auto; }
    .top { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .title { font-size:20px; font-weight:900; }
    .muted { color:#aaa; font-size:13px; }
    .btn { border:1px solid #333; background:#1a1a1a; color:#eee; padding:10px 12px; border-radius:12px; cursor:pointer; font-weight:800; }
    .btn.primary { background:#2f81f7; border:0; }
    .card { border:1px solid #333; border-radius:16px; padding:14px; background:#111217; margin-top:14px; }
    .row { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .left { min-width:0; }
    .name { font-weight:900; }
    .summary { color:#cfcfcf; margin-top:6px; white-space:pre-wrap; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#1a1a1a; border:1px solid #333; font-size:12px; font-weight:800; }
    select { background:#0f0f0f; color:#eee; border:1px solid #333; padding:10px; border-radius:12px; font-weight:800; }
    .err { color:#ff6b6b; white-space:pre-wrap; margin-top:10px; }
    .ok { color:#7ee787; white-space:pre-wrap; margin-top:10px; }
    .grid { display:flex; flex-direction:column; gap:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title" id="title">Staff Dashboard</div>
        <div class="muted" id="subtitle">Loading…</div>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
        <button class="btn" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>

    <div id="err" class="err"></div>
    <div id="ok" class="ok"></div>

    <div class="card">
      <div class="muted">Orders</div>
      <div class="grid" id="orders"></div>
    </div>
  </div>

<script>
  const errEl = document.getElementById("err");
  const okEl = document.getElementById("ok");
  const ordersEl = document.getElementById("orders");
  const titleEl = document.getElementById("title");
  const subtitleEl = document.getElementById("subtitle");

  function getSlugFromPath(){
    const parts = location.pathname.split("/").filter(Boolean);
    // /r/{slug}/staff
    if(parts.length >= 3 && parts[0] === "r" && parts[2] === "staff") return parts[1];
    return "";
  }

  const slug = getSlugFromPath();
  titleEl.textContent = `Staff Dashboard · ${slug || "unknown"}`;

  function tokenKey(slug){ return `staff_token:${slug}`; }

  function setError(msg){
    errEl.textContent = msg || "";
    okEl.textContent = "";
  }
  function setOk(msg){
    okEl.textContent = msg || "";
    errEl.textContent = "";
  }

  async function apiGetOrders(){
    const token = localStorage.getItem(tokenKey(slug));
    if(!token) throw new Error("No staff token found. Please log in again.");

    const res = await fetch(`/r/${slug}/staff/orders`, {
      headers: { "Authorization": `Bearer ${token}` }
    });

    const raw = await res.text();
    let data = null;
    try { data = raw ? JSON.parse(raw) : null; } catch {}

    if(!res.ok){
      const detail = (data && (data.detail || data.error)) || raw || `HTTP ${res.status}`;
      throw new Error(`Failed to load orders (${res.status})\n${detail}`);
    }
    return data;
  }

  async function apiSetStatus(orderId, status){
    const token = localStorage.getItem(tokenKey(slug));
    if(!token) throw new Error("No staff token found. Please log in again.");

    const res = await fetch(`/r/${slug}/staff/orders/${orderId}/status`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ status })
    });

    const raw = await res.text();
    let data = null;
    try { data = raw ? JSON.parse(raw) : null; } catch {}

    if(!res.ok){
      const detail = (data && (data.detail || data.error)) || raw || `HTTP ${res.status}`;
      throw new Error(`Failed to update status (${res.status})\n${detail}`);
    }
    return data;
  }

  function renderOrders(list){
    ordersEl.innerHTML = "";

    const orders = Array.isArray(list) ? list : [];
    subtitleEl.textContent = `${orders.length} active order${orders.length===1?"":"s"}`;

    if(orders.length === 0){
      const empty = document.createElement("div");
      empty.className = "muted";
      empty.style.padding = "10px 0";
      empty.textContent = "No orders right now.";
      ordersEl.appendChild(empty);
      return;
    }

    for(const o of orders){
      const card = document.createElement("div");
      card.className = "card";
      card.style.marginTop = "10px";

      const row = document.createElement("div");
      row.className = "row";

      const left = document.createElement("div");
      left.className = "left";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = `${o.name || "Customer"}  ·  ${o.phone || ""}`;

      const summary = document.createElement("div");
      summary.className = "summary";
      summary.textContent = o.summary || "";

      const status = document.createElement("div");
      status.style.marginTop = "10px";
      status.innerHTML = `<span class="pill">Status: ${o.status || "new"}</span>`;

      left.appendChild(name);
      left.appendChild(summary);
      left.appendChild(status);

      const right = document.createElement("div");

      const sel = document.createElement("select");
      const opts = ["new","accepted","preparing","ready","completed"];
      for(const s of opts){
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        if(String(o.status||"new").toLowerCase() === s) opt.selected = true;
        sel.appendChild(opt);
      }

      const btn = document.createElement("button");
      btn.className = "btn primary";
      btn.style.marginTop = "10px";
      btn.textContent = "Update";
      btn.onclick = async () => {
        try{
          btn.disabled = true;
          const out = await apiSetStatus(o.id, sel.value);
          setOk(`Updated order #${o.id} → ${out.status}`);
          await refresh();
        }catch(e){
          setError(String(e.message || e));
        }finally{
          btn.disabled = false;
        }
      };

      right.appendChild(sel);
      right.appendChild(btn);

      row.appendChild(left);
      row.appendChild(right);
      card.appendChild(row);
      ordersEl.appendChild(card);
    }
  }

  async function refresh(){
    try{
      setError("");
      const list = await apiGetOrders();
      renderOrders(list);
    }catch(e){
      renderOrders([]);
      setError(String(e.message || e));
      // If token missing/expired, bounce to login
      if(String(e.message || e).toLowerCase().includes("token")){
        // keep it gentle: give them a second to read
        setTimeout(() => location.href = "/staff/login", 600);
      }
    }
  }

  document.getElementById("refreshBtn").onclick = refresh;

  document.getElementById("logoutBtn").onclick = () => {
    if(slug) localStorage.removeItem(tokenKey(slug));
    localStorage.removeItem("staff_last_slug");
    location.href = "/staff/login";
  };

  // If slug missing, go to login
  if(!slug){
    subtitleEl.textContent = "Bad URL";
    setError("This page must be opened as /r/{slug}/staff");
  }else{
    refresh();
    // auto-refresh every 6 seconds
    setInterval(refresh, 6000);
  }
</script>
</body>
</html>
