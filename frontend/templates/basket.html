<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>JP · Basket</title>

  <style>
    :root{
      --bg:#ffffff;
      --text:#0b0b0b;
      --muted:#6b7280;
      --line:#e5e7eb;
      --chipBg:#f3f4f6;
      --primary:#2b6cff;

      --shadow:0 10px 30px rgba(0,0,0,.08);
      --padX:16px;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b0c0f;
        --text:#f9fafb;
        --muted:#a1a1aa;
        --line:rgba(255,255,255,.10);
        --chipBg:rgba(255,255,255,.08);
        --shadow:0 12px 40px rgba(0,0,0,.35);
      }
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
      -webkit-text-size-adjust:100%;
    }

    header{
      padding:12px 16px 10px;
      border-bottom:1px solid var(--line);
      background:var(--bg);
      position:sticky;
      top:0;
      z-index:10;
    }

    .topbar{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:12px;
    }

    .iconBtn{
      justify-self:start;
      font-size:13px;
      color:var(--text);
      border:1px solid var(--line);
      background:var(--chipBg);
      padding:8px 12px;
      border-radius:999px;
      user-select:none;
      cursor:pointer;
      width:fit-content;
    }
    #chatBtn{ justify-self:end; }

    .title{
      justify-self:center;
      text-align:center;
      font-weight:900;
      letter-spacing:-0.3px;
      font-size:18px;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:18px var(--padX) 24px;
    }

    .card{
      border:1px solid var(--line);
      background:transparent;
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .muted{ color:var(--muted); }

    .items{ margin-top:14px; display:flex; flex-direction:column; gap:10px; }

    .item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,.03);
    }

    .itemLeft{ min-width:0; }
    .name{ font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:52vw; }
    .sub{ font-size:12px; color:var(--muted); margin-top:4px; }

    .controls{ display:flex; align-items:center; gap:10px; flex:0 0 auto; }
    .qtyPill{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background:var(--chipBg);
      border-radius:999px;
      padding:6px 10px;
      font-weight:800;
      min-width:120px;
      justify-content:space-between;
    }

    .smallBtn{
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
      font-weight:800;
      min-width:42px;
      text-align:center;
    }

    .danger{
      border-color: rgba(255,255,255,.15);
      background: rgba(220,38,38,.14);
    }

    .actions{
      margin-top:14px;
      display:flex;
      gap:12px;
    }

    .primaryBtn{
      flex:1;
      border:0;
      background:var(--primary);
      color:#fff;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <button class="iconBtn" id="menuBtn" type="button">Menu</button>
      <div class="title" id="titleLine">Basket</div>
      <button class="iconBtn" id="chatBtn" type="button">Chat</button>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:900; font-size:18px;">Total</div>
          <div class="muted" id="statusLine" style="margin-top:4px;">Loading…</div>
        </div>
        <div style="font-weight:1000; font-size:22px;" id="totalLine">£0.00</div>
      </div>

      <div class="actions">
        <button class="smallBtn danger" id="clearBtn" type="button">Clear</button>
        <button class="primaryBtn" id="confirmBtn" type="button">Confirm</button>
      </div>

      <div class="items" id="items"></div>
    </div>
  </div>

<script>
  const parts = location.pathname.split("/").filter(Boolean);
  const slug = (parts.length >= 2 && parts[0] === "r") ? parts[1] : "unknown";

  const titleLine  = document.getElementById("titleLine");
  const totalLine  = document.getElementById("totalLine");
  const statusLine = document.getElementById("statusLine");
  const itemsEl    = document.getElementById("items");

  titleLine.textContent = `Basket · ${slug}`;

  function money(sym, n){
    const v = Number(n || 0);
    return `${sym}${v.toFixed(2)}`;
  }

  async function apiGetCart(){
    const res = await fetch(`/r/${slug}/cart`, { method:"GET" });
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error(data.detail || "Failed to load cart");
    return data;
  }

  async function apiUpdate(item_id, delta){
    const res = await fetch(`/r/${slug}/cart/update`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ item_id, delta })
    });
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error(data.detail || "Update failed");
    return data;
  }

  async function apiRemove(item_id){
    const res = await fetch(`/r/${slug}/cart/remove`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ item_id })
    });
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error(data.detail || "Remove failed");
    return data;
  }

  async function apiClear(){
    const res = await fetch(`/r/${slug}/cart/clear`, { method:"POST" });
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error(data.detail || "Clear failed");
    return data;
  }

  // Simple confirm: tell the chat brain "confirm", then clear cart
  async function apiConfirm(){
    const res = await fetch(`/r/${slug}/chat`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message: "confirm" })
    });
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error(data.detail || "Confirm failed");
    return data;
  }

  function renderCart(cart){
    const sym = cart.currency_symbol || "£";
    totalLine.textContent = money(sym, cart.total || 0);

    const items = Array.isArray(cart.items) ? cart.items : [];
    if(items.length === 0){
      statusLine.textContent = "Basket is empty";
      itemsEl.innerHTML = "";
      return;
    }

    statusLine.textContent = `${items.length} item${items.length===1?"":"s"} in basket`;

    itemsEl.innerHTML = "";
    for(const it of items){
      const row = document.createElement("div");
      row.className = "item";

      const left = document.createElement("div");
      left.className = "itemLeft";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = it.name || "Item";

      const sub = document.createElement("div");
      sub.className = "sub";
      sub.textContent = `Each: ${money(sym, it.base_price)}  •  Line: ${money(sym, it.line_total)}`;

      left.appendChild(name);
      left.appendChild(sub);

      const controls = document.createElement("div");
      controls.className = "controls";

      const qtyPill = document.createElement("div");
      qtyPill.className = "qtyPill";

      const minus = document.createElement("button");
      minus.className = "smallBtn";
      minus.textContent = "−";
      minus.onclick = async () => {
        try { renderCart(await apiUpdate(it.item_id, -1)); }
        catch(e){ console.error(e); alert(String(e.message || e)); }
      };

      const qty = document.createElement("div");
      qty.style.minWidth = "22px";
      qty.style.textAlign = "center";
      qty.textContent = String(it.qty || 1);

      const plus = document.createElement("button");
      plus.className = "smallBtn";
      plus.textContent = "+";
      plus.onclick = async () => {
        try { renderCart(await apiUpdate(it.item_id, +1)); }
        catch(e){ console.error(e); alert(String(e.message || e)); }
      };

      qtyPill.appendChild(minus);
      qtyPill.appendChild(qty);
      qtyPill.appendChild(plus);

      const remove = document.createElement("button");
      remove.className = "smallBtn danger";
      remove.textContent = "Remove";
      remove.onclick = async () => {
        try { renderCart(await apiRemove(it.item_id)); }
        catch(e){ console.error(e); alert(String(e.message || e)); }
      };

      controls.appendChild(qtyPill);
      controls.appendChild(remove);

      row.appendChild(left);
      row.appendChild(controls);
      itemsEl.appendChild(row);
    }
  }

  async function refresh(){
    try{
      const cart = await apiGetCart();
      renderCart(cart);
    }catch(e){
      statusLine.textContent = "Could not load basket";
      console.error(e);
      alert(String(e.message || e));
    }
  }

  document.getElementById("menuBtn").addEventListener("click", () => {
    window.location.href = `/r/${slug}`;
  });
  document.getElementById("chatBtn").addEventListener("click", () => {
    window.location.href = `/r/${slug}`;
  });

  document.getElementById("clearBtn").addEventListener("click", async () => {
    if(!confirm("Clear the basket?")) return;
    try{ renderCart(await apiClear()); }
    catch(e){ console.error(e); alert(String(e.message || e)); }
  });

  document.getElementById("confirmBtn").addEventListener("click", async () => {
    try{
      const cart = await apiGetCart();
      if(!cart.items || cart.items.length === 0){
        alert("Basket is empty. Add something first 🙂");
        return;
      }

      const out = await apiConfirm();
      // out.reply might say Confirmed ✅ etc.
      alert(out.reply || "Confirmed ✅");

      // If you want basket cleared after confirm:
      await apiClear();

      window.location.href = `/r/${slug}`;
    }catch(e){
      console.error(e);
      alert(String(e.message || e));
    }
  });

  refresh();
</script>
</body>
</html>
