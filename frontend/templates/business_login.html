{% extends "base.html" %}

{% block content %}
<section class="hero narrow">
  <div class="card">
    <h1>Business Sign In</h1>
    <p class="subtitle">Sign in to manage your restaurant orders.</p>

    {% if error %}
      <p class="muted error-text">
        {% if error == "bad_login" %}
          Invalid email or password.
        {% else %}
          {{ error }}
        {% endif %}
      </p>
    {% endif %}

    <form class="manual-form" method="post" action="/auth/login">
      <input type="hidden" name="next" value="{{ next or '/business' }}">

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <div class="button-row">
        <button type="submit" class="btn btn-primary">Sign In</button>
        <a href="/business" class="btn btn-secondary">Back</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
