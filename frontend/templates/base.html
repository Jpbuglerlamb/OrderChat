<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JP AI Platform</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="brand">JP AI Platform</div>

      <nav class="nav">
        <a href="/">Home</a>
        <a href="/customer">Customer</a>
        <a href="/business">Business</a>

        {% if current_user %}
          <a href="{{ dashboard_url or '/business' }}" class="nav-dashboard">Dashboard</a>
          <span class="nav-user">Signed in as {{ current_user.name or current_user.email }}</span>

          <form method="post" action="/auth/logout" style="display:inline;">
            <button type="submit" class="nav-link-button">Log out</button>
          </form>
        {% else %}
          <a href="/business/login">Log in</a>
          <a href="/business/signup">Sign up</a>
        {% endif %}
      </nav>
    </header>

    <main class="main">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      © JP AI · Universal login for chat ordering
    </footer>
  </div>
</body>
</html>
