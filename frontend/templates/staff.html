{% extends "base.html" %}

{% block content %}
<section class="hero">
  <div class="card" style="text-align:left;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px;">
      <div>
        <h1 style="margin-bottom:8px;">Staff Dashboard</h1>
        <p class="subtitle" style="margin:0; max-width:none;">
          Live order control for <strong>{{ restaurant_slug }}</strong>.
        </p>
      </div>

      <div class="button-row" style="margin-top:0;">
        <button id="refreshBtn" type="button" class="btn btn-secondary">Refresh</button>
        <a href="/r/{{ restaurant_slug }}" class="btn btn-secondary">Back to Chat</a>
        <a href="/" class="btn btn-secondary">Home</a>
        <a href="/business/settings" class="btn btn-secondary">Settings</a>
      </div>
    </div>

    <div class="success-card-meta">
      Access mode:
      <strong>{{ access_mode or "unknown" }}</strong>
    </div>

    <p class="muted" id="ordersCountText" style="margin-top:8px;">
      Loading orders...
    </p>

    <div id="ordersMount" style="display:grid; grid-template-columns:1fr; gap:18px; margin-top:20px;"></div>
  </div>
</section>

<script>
  const slug = "{{ restaurant_slug }}";
  const ordersMount = document.getElementById("ordersMount");
  const ordersCountText = document.getElementById("ordersCountText");
  const refreshBtn = document.getElementById("refreshBtn");

  function escapeHtml(text) {
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function prettyStatus(status) {
    const s = String(status || "new").toLowerCase();
    if (s === "new") return "New";
    if (s === "accepted") return "Accepted";
    if (s === "preparing") return "Preparing";
    if (s === "ready") return "Ready";
    if (s === "completed") return "Completed";
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  async function apiStaffOrders() {
    const res = await fetch(`/r/${slug}/staff/orders`, {
      method: "GET",
      credentials: "same-origin",
    });

    if (res.status === 401 || res.status === 403) {
      window.location.href = `/business/login?next=/r/${slug}/staff`;
      return [];
    }

    const data = await res.json().catch(() => ([]));

    if (!res.ok) {
      throw new Error(data.detail || "Failed to load staff orders");
    }

    return Array.isArray(data) ? data : [];
  }

  async function apiUpdateStatus(orderId, status) {
    const res = await fetch(`/r/${slug}/staff/orders/${orderId}/status`, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ status }),
    });

    if (res.status === 401 || res.status === 403) {
      window.location.href = `/business/login?next=/r/${slug}/staff`;
      return null;
    }

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(data.detail || "Failed to update order status");
    }

    return data;
  }

  function renderEmpty() {
    ordersMount.innerHTML = `
      <div class="pricing-plan">
        <h2>No active orders</h2>
        <p class="muted">Fresh air. Quiet kitchen. Nothing waiting right now.</p>
      </div>
    `;
    ordersCountText.textContent = "0 active orders";
  }

  function renderOrders(orders) {
    if (!orders.length) {
      renderEmpty();
      return;
    }

    ordersCountText.textContent = `${orders.length} active order${orders.length === 1 ? "" : "s"}`;

    ordersMount.innerHTML = orders.map((o) => {
      const status = String(o.status || "new").toLowerCase();
      const phone = String(o.phone || "").trim();
      const summary = String(o.summary || "").trim();

      return `
        <article class="pricing-plan ${status === "new" ? "featured" : ""}" data-order-id="${escapeHtml(o.id)}">
          <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start;">
            <div>
              <h2 style="margin-bottom:8px;">${escapeHtml(o.name || "Customer")}</h2>
              <p class="muted" style="margin:0;">${phone ? escapeHtml(phone) : "No phone provided"}</p>
            </div>

            <span class="plan-tag">${escapeHtml(prettyStatus(status))}</span>
          </div>

          <div style="margin-top:16px; white-space:pre-wrap; line-height:1.5;">
${escapeHtml(summary || "No summary available.")}
          </div>

          <div class="plan-actions" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;">
            <select class="statusSelect" style="flex:1; min-width:180px;">
              <option value="new" ${status === "new" ? "selected" : ""}>New</option>
              <option value="accepted" ${status === "accepted" ? "selected" : ""}>Accepted</option>
              <option value="preparing" ${status === "preparing" ? "selected" : ""}>Preparing</option>
              <option value="ready" ${status === "ready" ? "selected" : ""}>Ready</option>
              <option value="completed" ${status === "completed" ? "selected" : ""}>Completed</option>
            </select>

            <button class="btn btn-primary updateBtn" type="button">Update status</button>
          </div>
        </article>
      `;
    }).join("");

    document.querySelectorAll(".updateBtn").forEach((btn) => {
      btn.addEventListener("click", async (e) => {
        const card = e.currentTarget.closest("[data-order-id]");
        const orderId = card ? card.getAttribute("data-order-id") : null;
        const select = card ? card.querySelector(".statusSelect") : null;

        if (!orderId || !select) return;

        const newStatus = select.value;
        const oldText = btn.textContent;

        try {
          btn.disabled = true;
          btn.textContent = "Updating...";
          await apiUpdateStatus(orderId, newStatus);
          await loadOrders();
        } catch (err) {
          alert(String(err.message || err));
        } finally {
          btn.disabled = false;
          btn.textContent = oldText;
        }
      });
    });
  }

  async function loadOrders() {
    try {
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Refreshing...";
      const orders = await apiStaffOrders();
      renderOrders(orders);
    } catch (err) {
      ordersMount.innerHTML = `
        <div class="pricing-plan">
          <h2>Couldn't load orders</h2>
          <p class="muted">${escapeHtml(err.message || "Something went wrong.")}</p>
        </div>
      `;
      ordersCountText.textContent = "Error loading orders";
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.textContent = "Refresh";
    }
  }

  refreshBtn.addEventListener("click", loadOrders);
  loadOrders();
</script>
{% endblock %}
