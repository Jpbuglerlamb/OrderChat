{% extends "base.html" %}

{% block content %}
<section class="hero narrow">
  <div class="card">
    <h1>Create Business Account</h1>
    <p class="subtitle">
      Set up your restaurant account to start onboarding your takeaway.
    </p>

    <form class="manual-form" method="post" action="/business/signup">
      <label for="name">Your name</label>
      <input id="name" name="name" type="text" placeholder="e.g. Joan Lamb" required>

      <label for="business_name">Business name</label>
      <input id="business_name" name="business_name" type="text" placeholder="e.g. Pizza Palace" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@restaurant.com" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Create a password" required>

      <div class="button-row">
        <button type="submit" class="btn btn-primary">Create Account</button>
        <a href="/business" class="btn btn-secondary">Back</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
