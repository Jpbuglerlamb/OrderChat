{% extends "base.html" %}

{% block content %}
<section class="hero narrow">
  <div class="card">
    <h1>Staff Login</h1>
    <p class="subtitle">
      Log in to access your restaurant dashboard.
    </p>

    {% if error %}
      <p class="error-text" style="margin-bottom: 18px;">Invalid email or password.</p>
    {% endif %}

    <form method="post" action="/staff/login" class="manual-form">
      <input type="hidden" name="next" value="{{ next or '' }}">

      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        placeholder="staff@restaurant.com"
        autocomplete="username"
        required
      >

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Enter password"
        autocomplete="current-password"
        required
      >

      <p class="muted" style="margin-top: 6px;">
        Business owners usually won’t need this page unless they are logged out.
      </p>

      <div class="button-row">
        <button type="submit" class="btn btn-primary">Log in</button>
        <a href="/business" class="btn btn-secondary">Back</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
