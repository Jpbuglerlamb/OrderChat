<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>JP · Order</title>

  <style>
    :root{
      --bg:#081120;
      --bg2:#101a34;
      --text:#eef2ff;
      --muted:#b8c0d9;
      --line:rgba(255,255,255,.12);

      --primaryA:#7b61ff;
      --primaryB:#4f8cff;
      --primaryC:#22c7a9;

      --userText:#ffffff;
      --botText:#f5f7ff;

      --shadow:0 18px 50px rgba(0,0,0,.28);
      --kb:0px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(79,140,255,.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(34,199,169,.14), transparent 24%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      color:var(--text);
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
    }

    button, input{
      font:inherit;
    }

    .shell{
      width:min(100%, 920px);
      margin:0 auto;
    }

    .app{
      min-height:100svh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
    }

    .appHeader{
      position:sticky;
      top:0;
      z-index:20;
      border-bottom:1px solid var(--line);
      background:rgba(8,17,32,.72);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      padding:12px 16px 10px;
    }

    .iconBtn{
      justify-self:start;
      width:fit-content;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:transform .08s ease, opacity .15s ease, background .2s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .iconBtn:hover{
      background:rgba(255,255,255,.09);
    }

    .iconBtn:active{
      transform:scale(.98);
    }

    .iconBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    #basketBtn{
      justify-self:end;
    }

    .brandCenter{
      justify-self:center;
      text-align:center;
      min-width:0;
    }

    .brandTitle{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:800;
      letter-spacing:-0.3px;
      font-size:18px;
      line-height:1.1;
    }

    .brandMark{
      width:18px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(180deg, var(--primaryA), var(--primaryB), var(--primaryC));
      box-shadow:0 8px 24px rgba(79,140,255,.25);
      display:inline-block;
      flex:0 0 auto;
    }

    .brandDotSep{
      opacity:.4;
    }

    .brandPowered{
      font-weight:700;
      opacity:.94;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#9cf2c4;
      box-shadow:0 0 0 5px rgba(156,242,196,.12);
      flex:0 0 auto;
    }

    .brandSub{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .content{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .chatPanel{
      flex:1;
      min-height:0;
      padding:18px 14px 110px;
    }

    .chat{
      height:100%;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding:0 0 calc(18px + var(--kb));
    }

    .welcome{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:24px;
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .welcomeTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-size:17px;
      font-weight:900;
      letter-spacing:-0.2px;
    }

    .welcomeTitleMain{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .welcomeLogo{
      width:20px;
      height:46px;
      border-radius:16px;
      background:linear-gradient(180deg, var(--primaryA), var(--primaryB), var(--primaryC));
      box-shadow:0 8px 24px rgba(79,140,255,.25);
      flex:0 0 auto;
    }

    .welcomeBadge{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      padding:8px 10px;
      border-radius:999px;
      white-space:nowrap;
    }

    .welcomeSub{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .welcomeRow{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .pillBtn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      border-radius:18px;
      padding:10px 14px;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      user-select:none;
    }

    .pillBtn.primary{
      border:0;
      background:linear-gradient(135deg, var(--primaryA), var(--primaryB), var(--primaryC));
      color:#fff;
      box-shadow:0 8px 24px rgba(79,140,255,.22);
    }

    .nameInput{
      flex:1;
      min-width:180px;
      padding:12px 14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      outline:none;
    }

    .nameInput::placeholder{
      color:rgba(232,238,255,.46);
    }

    .row{
      display:flex;
      margin:12px 0;
    }

    .row.user{
      justify-content:flex-end;
    }

    .row.bot{
      justify-content:flex-start;
    }

    .stack{
      max-width:80%;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .bubble{
      width:fit-content;
      max-width:100%;
      padding:12px 14px;
      border-radius:20px;
      line-height:1.4;
      font-size:15px;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
    }

    .bubble.user{
      background:linear-gradient(135deg, #111827, #0b1220);
      color:var(--userText);
      border-top-right-radius:10px;
      border:1px solid rgba(255,255,255,.06);
    }

    .bubble.bot{
      background:rgba(255,255,255,.08);
      color:var(--botText);
      border-top-left-radius:10px;
      border:1px solid rgba(255,255,255,.05);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .meta{
      font-size:11px;
      color:var(--muted);
      padding:0 4px;
    }

    .summaryBubble{
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:13px;
      box-shadow:var(--shadow);
    }

    .composer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      transform:translateY(calc(-1 * var(--kb)));
      border-top:1px solid var(--line);
      background:rgba(8,17,32,.76);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
      z-index:50;
    }

    .composerInner{
      max-width:920px;
      margin:0 auto;
    }

    .inputRow{
      display:flex;
      gap:10px;
      align-items:center;
    }

    #input{
      flex:1;
      padding:13px 14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:16px;
      outline:none;
      -webkit-appearance:none;
      appearance:none;
      box-shadow:none;
    }

    #input::placeholder{
      color:rgba(232,238,255,.46);
    }

    #input:focus{
      border-color:rgba(123,97,255,.55);
      box-shadow:0 0 0 3px rgba(123,97,255,.14);
    }

    #send{
      padding:13px 16px;
      border-radius:18px;
      border:0;
      background:linear-gradient(135deg, var(--primaryA), var(--primaryB), var(--primaryC));
      color:#fff;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      min-width:96px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .08s ease, opacity .15s ease;
      box-shadow:0 10px 24px rgba(79,140,255,.22);
    }

    #send:active{
      transform:scale(.98);
    }

    #send:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .spinner{
      width:14px;
      height:14px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.45);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
      display:none;
    }

    .sending .spinner{
      display:inline-block;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @media (max-width: 640px){
      .topbar{
        padding:12px 12px 10px;
      }

      .brandTitle{
        font-size:16px;
      }

      .stack{
        max-width:86%;
      }

      .welcomeRow{
        flex-direction:column;
        align-items:stretch;
      }

      .nameInput,
      .pillBtn{
        width:100%;
      }

      #send{
        min-width:88px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="appHeader">
      <div class="topbar shell">
        <button class="iconBtn" id="menuBtn" type="button">Menu</button>

        <div class="brandCenter">
          <div class="brandTitle">
            <span class="brandMark" aria-hidden="true"></span>
            <span>JP</span>
            <span class="brandDotSep">·</span>
            <span class="brandPowered">AI Powered</span>
            <span class="dot" aria-hidden="true"></span>
          </div>
          <div class="brandSub" id="restaurantLine">Ordering</div>
        </div>

        <button class="iconBtn" id="basketBtn" type="button">Basket</button>
      </div>
    </header>

    <main class="content shell">
      <section class="chatPanel">
        <div class="chat" id="chat">
          <div id="welcomeMount"></div>
        </div>
      </section>
    </main>

    <div class="composer" id="composer">
      <div class="composerInner shell">
        <div class="inputRow">
          <input
            id="input"
            autocomplete="off"
            inputmode="text"
            placeholder="Type your order… e.g. coke + spring rolls"
          />
          <button id="send" type="button">
            <span class="spinner"></span>
            <span class="btnText">Send</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const parts = location.pathname.split("/").filter(Boolean);
    const slug = (parts.length >= 2 && parts[0] === "r") ? parts[1] : "unknown";

    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const btnText = document.querySelector(".btnText");
    const restaurantLine = document.getElementById("restaurantLine");
    const welcomeMount = document.getElementById("welcomeMount");

    restaurantLine.textContent = `Restaurant: ${slug}`;

    let summaryRow = null;
    let introRow = null;
    let currentProfile = { is_guest: true, name: "" };

    function nowTime() {
      const d = new Date();
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function scrollToBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function isRealName(name) {
      const n = String(name || "").trim();
      return !!n && n.toLowerCase() !== "guest";
    }

    function greetingText(profile) {
      const rawName = String(profile?.name || "").trim();
      return isRealName(rawName)
        ? `Hi ${rawName}, what can I get you today?`
        : "Hi! What can I get you today?";
    }

    function ensureIntroRow() {
      if (introRow) return introRow;

      introRow = document.createElement("div");
      introRow.className = "row bot introRow";

      const stack = document.createElement("div");
      stack.className = "stack";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.id = "introBubble";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.id = "introMeta";

      stack.appendChild(bubble);
      stack.appendChild(meta);
      introRow.appendChild(stack);
      chatEl.appendChild(introRow);

      return introRow;
    }

    function renderIntro(profile) {
      ensureIntroRow();
      document.getElementById("introBubble").textContent = greetingText(profile);
      document.getElementById("introMeta").textContent = nowTime();
      scrollToBottom();
    }

    function addMsg(text, who) {
      const row = document.createElement("div");
      row.className = "row " + who;

      const stack = document.createElement("div");
      stack.className = "stack";

      const bubble = document.createElement("div");
      bubble.className = "bubble " + who;
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = nowTime();

      stack.appendChild(bubble);
      stack.appendChild(meta);
      row.appendChild(stack);
      chatEl.appendChild(row);
      scrollToBottom();
    }

    function renderSummary(summary) {
      if (!summary || !String(summary).trim()) {
        if (summaryRow) summaryRow.remove();
        summaryRow = null;
        return;
      }

      const cleaned = String(summary).replace(/^Order summary:\s*/i, "");

      if (!summaryRow) {
        summaryRow = document.createElement("div");
        summaryRow.className = "row bot";

        const stack = document.createElement("div");
        stack.className = "stack";

        const bubble = document.createElement("div");
        bubble.className = "bubble bot summaryBubble";

        const meta = document.createElement("div");
        meta.className = "meta";

        stack.appendChild(bubble);
        stack.appendChild(meta);
        summaryRow.appendChild(stack);
        chatEl.appendChild(summaryRow);
      }

      summaryRow.querySelector(".summaryBubble").textContent = cleaned;
      summaryRow.querySelector(".meta").textContent = "Updated " + nowTime();
      scrollToBottom();
    }

    function isGreeting(s) {
      const t = (s || "").trim().toLowerCase();
      return ["hi", "hello", "hey", "hiya", "yo", "alright", "alright mate", "morning", "evening"].includes(t);
    }

    function setSending(on) {
      if (on) {
        sendBtn.disabled = true;
        sendBtn.classList.add("sending");
        btnText.textContent = "Sending";
      } else {
        sendBtn.disabled = false;
        sendBtn.classList.remove("sending");
        btnText.textContent = "Send";
      }
    }

    async function apiChat(message) {
      const res = await fetch(`/r/${slug}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Request failed");
      return data;
    }

    async function apiMe() {
      const res = await fetch(`/r/${slug}/me`, { method: "GET" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Failed to load profile");
      return data;
    }

    async function apiSaveName(name) {
      const res = await fetch(`/r/${slug}/me/name`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Failed to save name");
      return data;
    }

    function renderWelcomeCard(profile) {
      const isGuest = !!profile.is_guest;
      const rawName = String(profile.name || "").trim();
      const realName = isRealName(rawName) ? rawName : "";

      const card = document.createElement("div");
      card.className = "welcome";

      const title = document.createElement("div");
      title.className = "welcomeTitle";
      title.innerHTML = `
        <div class="welcomeTitleMain">
          <span class="welcomeLogo" aria-hidden="true"></span>
          <span id="welcomeTitleText">${realName ? `Welcome, ${realName}` : "Welcome to JP AI"}</span>
        </div>
        <span class="welcomeBadge">${isGuest ? "Guest" : "Saved"}</span>
      `;

      const sub = document.createElement("div");
      sub.className = "welcomeSub";
      sub.textContent = isGuest
        ? "Save your name or sign in to keep your orders remembered across visits."
        : "You’re signed in. Your orders and name are saved.";

      const row = document.createElement("div");
      row.className = "welcomeRow";

      const nameInput = document.createElement("input");
      nameInput.className = "nameInput";
      nameInput.id = "nameInput";
      nameInput.placeholder = "Your name (e.g. JP)";
      nameInput.value = realName;

      const saveBtn = document.createElement("button");
      saveBtn.className = "pillBtn primary";
      saveBtn.type = "button";
      saveBtn.textContent = "Save name";

      saveBtn.onclick = async () => {
        const n = String(nameInput.value || "").trim();
        if (!n) {
          alert("Type a name first 🙂");
          return;
        }

        try {
          saveBtn.textContent = "Saving…";
          saveBtn.disabled = true;

          const out = await apiSaveName(n);
          const savedName = String(out.name || n).trim();

          currentProfile = {
            ...currentProfile,
            name: savedName
          };

          renderWelcomeCard(currentProfile);
          renderIntro(currentProfile);
        } catch (e) {
          alert(String(e.message || e));
        } finally {
          saveBtn.textContent = "Save name";
          saveBtn.disabled = false;
        }
      };

      row.appendChild(nameInput);
      row.appendChild(saveBtn);

      if (isGuest) {
        const loginBtn = document.createElement("button");
        loginBtn.className = "pillBtn";
        loginBtn.type = "button";
        loginBtn.textContent = "Log in";
        loginBtn.onclick = () => location.href = "/auth/login";

        const signupBtn = document.createElement("button");
        signupBtn.className = "pillBtn";
        signupBtn.type = "button";
        signupBtn.textContent = "Sign up";
        signupBtn.onclick = () => location.href = "/auth/signup";

        row.appendChild(loginBtn);
        row.appendChild(signupBtn);
      }

      card.appendChild(title);
      card.appendChild(sub);
      card.appendChild(row);

      welcomeMount.innerHTML = "";
      welcomeMount.appendChild(card);
    }

    async function sendMessage(raw) {
      const text = (raw ?? inputEl.value ?? "").trim();
      if (!text) return;

      inputEl.value = "";
      addMsg(text, "user");

      if (isGreeting(text)) {
        addMsg("Hey. You can ask for the menu, browse a category, or type an item like “coke + spring rolls”.", "bot");
        inputEl.focus();
        return;
      }

      setSending(true);
      try {
        const data = await apiChat(text);
        addMsg(data.reply || "(no reply)", "bot");
        renderSummary(data.summary || "");
      } catch (e) {
        addMsg("Sorry, something went wrong. Try again in a second.", "bot");
        console.error(e);
      } finally {
        setSending(false);
        inputEl.focus();
        scrollToBottom();
      }
    }

    document.getElementById("menuBtn").addEventListener("click", () => sendMessage("menu"));
    document.getElementById("basketBtn").addEventListener("click", () => {
      window.location.href = `/r/${slug}/basket`;
    });

    sendBtn.addEventListener("click", () => sendMessage());
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });

    (function keyboardFix() {
      const root = document.documentElement;

      function update() {
        const vv = window.visualViewport;
        if (!vv) {
          root.style.setProperty("--kb", "0px");
          return;
        }
        const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
        root.style.setProperty("--kb", kb + "px");
        scrollToBottom();
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", update);
        window.visualViewport.addEventListener("scroll", update);
      }

      window.addEventListener("resize", update);
      update();
    })();

    (async function init() {
      renderWelcomeCard(currentProfile);
      renderIntro(currentProfile);

      try {
        const me = await apiMe();
        currentProfile = me || { is_guest: true, name: "" };
        renderWelcomeCard(currentProfile);
        renderIntro(currentProfile);
      } catch (e) {
        console.warn("Profile fetch failed, using guest fallback:", e);
      }

      inputEl.focus();
    })();
  </script>
</body>
</html>
