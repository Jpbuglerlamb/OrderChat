<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>JP · Order</title>

  <style>
    :root{
      --bg:#ffffff;
      --text:#0b0b0b;
      --muted:#6b7280;
      --line:#e5e7eb;
      --chipBg:#f3f4f6;
      --primary:#2b6cff;

      --userBg:#111111;
      --userText:#ffffff;

      --botBg:#f3f4f6;
      --botText:#111111;

      --shadow:0 10px 30px rgba(0,0,0,.08);

      --padX:14px;
      --kb:0px;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b0c0f;
        --text:#f9fafb;
        --muted:#a1a1aa;
        --line:rgba(255,255,255,.10);
        --chipBg:rgba(255,255,255,.08);

        --userBg:#2a2a2e;
        --userText:#ffffff;

        --botBg:rgba(255,255,255,.10);
        --botText:#f9fafb;

        --shadow:0 12px 40px rgba(0,0,0,.35);
      }
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
    }

    .app{
      height:100svh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    header{
      padding:12px 16px 10px;
      border-bottom:1px solid var(--line);
      background:var(--bg);
      position:sticky;
      top:0;
      z-index:10;
    }

    .topbar{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:12px;
    }

    .iconBtn{
      justify-self:start;
      font-size:13px;
      color:var(--text);
      border:1px solid var(--line);
      background:var(--chipBg);
      padding:8px 12px;
      border-radius:999px;
      user-select:none;
      cursor:pointer;
      width:fit-content;
      transition:transform .08s ease, opacity .15s ease;
    }
    #basketBtn{ justify-self:end; }
    .iconBtn:active{ transform:scale(.98); }
    .iconBtn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

    .brandCenter{
      justify-self:center;
      text-align:center;
      min-width:0;
    }

    .brandTitle{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:800;
      letter-spacing:-0.3px;
      font-size:16px;
      line-height:1.1;
    }
    .dot{
      width:7px;
      height:7px;
      border-radius:999px;
      background: #20c997;
      box-shadow: 0 0 0 4px rgba(32,201,151,.14);
      flex:0 0 auto;
    }
    .brandSub{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .content{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .chat{
      flex:1;
      min-height:0;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding:18px var(--padX) calc(18px + var(--kb));
    }

    /* Welcome card */
    .welcome{
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }
    .welcomeTitle{
      font-weight:900;
      font-size:16px;
      letter-spacing:-0.2px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .welcomeSub{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }
    .welcomeRow{
      margin-top:10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .pillBtn{
      border:1px solid var(--line);
      background:var(--chipBg);
      color:var(--text);
      border-radius:999px;
      padding:8px 12px;
      font-weight:800;
      font-size:13px;
      cursor:pointer;
      user-select:none;
    }
    .pillBtn.primary{
      border:0;
      background:var(--primary);
      color:#fff;
    }
    .nameInput{
      flex:1;
      min-width:180px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      outline:none;
    }

    .row{ display:flex; margin:10px 0; }
    .row.user{ justify-content:flex-end; }
    .row.bot{ justify-content:flex-start; }

    .stack{
      max-width:78%;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .bubble{
      flex: 0 1 auto;
      width: fit-content;
      min-width: fit-content;
      max-width: 100%;
      padding: 11px 12px;
      border-radius: 18px;
      line-height: 1.35;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    .bubble.user{
      background:var(--userBg);
      color:var(--userText);
      border-top-right-radius: 10px;
    }

    .bubble.bot{
      background:var(--botBg);
      color:var(--botText);
      border-top-left-radius: 10px;
    }

    .meta{
      font-size:11px;
      color:var(--muted);
      padding:0 4px;
    }

    .summaryBubble{
      border:1px solid var(--line);
      background:transparent;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size:13px;
      box-shadow:var(--shadow);
    }

    .composer{
      position:fixed;
      left:0; right:0; bottom:0;
      transform: translateY(calc(-1 * var(--kb)));
      border-top:1px solid var(--line);
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
      z-index:50;
    }
    @media (prefers-color-scheme: dark){
      .composer{ background: rgba(15,15,18,.72); }
    }

    .composerInner{ max-width:880px; margin:0 auto; }
    .inputRow{ display:flex; gap:10px; align-items:center; }

    input#input{
      flex:1;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      font-size:16px;
      outline:none;
      -webkit-appearance:none;
      appearance:none;
      box-shadow:none;
    }
    input#input:focus{
      border-color: rgba(43,108,255,.55);
      box-shadow: 0 0 0 3px rgba(43,108,255,.14);
    }

    button#send{
      padding:12px 14px;
      border-radius:14px;
      border:0;
      background:var(--primary);
      color:#fff;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      min-width:92px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .08s ease, opacity .15s ease;
    }
    button#send:active{ transform:scale(.98); }
    button#send:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

    .spinner{
      width:14px; height:14px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.45);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
      display:none;
    }
    .sending .spinner{ display:inline-block; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="topbar">
        <button class="iconBtn" id="menuBtn" type="button">Menu</button>

        <div class="brandCenter">
          <div class="brandTitle">
            <span>JP</span>
            <span style="opacity:.45;">·</span>
            <span style="font-weight:700; opacity:.9;">AI Powered</span>
            <span class="dot" aria-hidden="true"></span>
          </div>
          <div class="brandSub" id="restaurantLine">Ordering</div>
        </div>

        <button class="iconBtn" id="basketBtn" type="button">Basket</button>
      </div>
    </header>

    <div class="content">
      <div class="chat" id="chat">

        <!-- Welcome card injected by JS; placeholder keeps layout stable -->
        <div id="welcomeMount"></div>

      </div>
    </div>

    <div class="composer" id="composer">
      <div class="composerInner">
        <div class="inputRow">
          <input id="input" autocomplete="off" inputmode="text"
                 placeholder="Type your order… e.g. coke + spring rolls" />
          <button id="send" type="button">
            <span class="spinner"></span>
            <span class="btnText">Send</span>
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
  const parts = location.pathname.split("/").filter(Boolean);
  const slug = (parts.length >= 2 && parts[0] === "r") ? parts[1] : "unknown";

  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const btnText = document.querySelector(".btnText");
  const restaurantLine = document.getElementById("restaurantLine");
  const welcomeMount = document.getElementById("welcomeMount");

  restaurantLine.textContent = `Restaurant: ${slug}`;

  function nowTime(){
    const d = new Date();
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }
  function scrollToBottom(){ chatEl.scrollTop = chatEl.scrollHeight; }

  function addMsg(text, who){
    const row = document.createElement("div");
    row.className = "row " + who;

    const stack = document.createElement("div");
    stack.className = "stack";

    const bubble = document.createElement("div");
    bubble.className = "bubble " + who;
    bubble.textContent = text;

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = nowTime();

    stack.appendChild(bubble);
    stack.appendChild(meta);
    row.appendChild(stack);
    chatEl.appendChild(row);
    scrollToBottom();
  }

  let summaryRow = null;
  function renderSummary(summary){
    if(!summary || !String(summary).trim()){
      if(summaryRow) summaryRow.remove();
      summaryRow = null;
      return;
    }
    const cleaned = String(summary).replace(/^Order summary:\s*/i, "");

    if(!summaryRow){
      summaryRow = document.createElement("div");
      summaryRow.className = "row bot";

      const stack = document.createElement("div");
      stack.className = "stack";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot summaryBubble";

      const meta = document.createElement("div");
      meta.className = "meta";

      stack.appendChild(bubble);
      stack.appendChild(meta);
      summaryRow.appendChild(stack);
      chatEl.appendChild(summaryRow);
    }

    summaryRow.querySelector(".summaryBubble").textContent = cleaned;
    summaryRow.querySelector(".meta").textContent = "Updated " + nowTime();
    scrollToBottom();
  }

  function isGreeting(s){
    const t = (s || "").trim().toLowerCase();
    return ["hi","hello","hey","hiya","yo","alright","alright mate","morning","evening"].includes(t);
  }

  function setSending(on){
    if(on){
      sendBtn.disabled = true;
      sendBtn.classList.add("sending");
      btnText.textContent = "Sending";
    }else{
      sendBtn.disabled = false;
      sendBtn.classList.remove("sending");
      btnText.textContent = "Send";
    }
  }

  async function apiChat(message){
    const res = await fetch(`/r/${slug}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });
    const data = await res.json().catch(() => ({}));
    if(!res.ok) throw new Error(data.detail || "Request failed");
    return data;
  }

  // NEW: who-am-I
  async function apiMe(){
    const res = await fetch(`/r/${slug}/me`, { method:"GET" });
    const data = await res.json().catch(() => ({}));
    if(!res.ok) throw new Error(data.detail || "Failed to load profile");
    return data;
  }

  // NEW: save name
  async function apiSaveName(name){
    const res = await fetch(`/r/${slug}/me/name`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ name })
    });
    const data = await res.json().catch(() => ({}));
    if(!res.ok) throw new Error(data.detail || "Failed to save name");
    return data;
  }

  // NEW: welcome card
  function renderWelcomeCard(profile){
    const isGuest = !!profile.is_guest;
    const name = String(profile.name || "").trim();

    const card = document.createElement("div");
    card.className = "welcome";

    const title = document.createElement("div");
    title.className = "welcomeTitle";
    title.innerHTML = `<span id="welcomeTitleText">Welcome to JP AI</span><span style="font-size:12px; color: var(--muted); font-weight:800;">${isGuest ? "Guest" : "Saved"}</span>`;

    const sub = document.createElement("div");
    sub.className = "welcomeSub";
    sub.id = "welcomeSubText";
    sub.textContent = isGuest
      ? "Sign up or log in to save your orders and have your name remembered."
      : "You’re logged in. Your orders and name are saved.";

    const row = document.createElement("div");
    row.className = "welcomeRow";

    const nameInput = document.createElement("input");
    nameInput.className = "nameInput";
    nameInput.id = "nameInput";
    nameInput.placeholder = "Your name (e.g. JP)";
    nameInput.value = name;

    const saveBtn = document.createElement("button");
    saveBtn.className = "pillBtn primary";
    saveBtn.textContent = "Save name";
    saveBtn.onclick = async () => {
      const n = String(nameInput.value || "").trim();
      if(!n){
        alert("Type a name first 🙂");
        return;
      }
      try{
        saveBtn.textContent = "Saving…";
        saveBtn.disabled = true;
        const out = await apiSaveName(n);
        // Refresh UI label
        document.getElementById("welcomeTitleText").textContent = `Welcome, ${out.name || n}`;
        saveBtn.textContent = "Saved ✅";
        setTimeout(()=> { saveBtn.textContent = "Save name"; saveBtn.disabled = false; }, 900);
      }catch(e){
        saveBtn.textContent = "Save name";
        saveBtn.disabled = false;
        alert(String(e.message || e));
      }
    };

    const loginBtn = document.createElement("button");
    loginBtn.className = "pillBtn";
    loginBtn.textContent = "Log in";
    loginBtn.onclick = () => location.href = "/auth/login";

    const signupBtn = document.createElement("button");
    signupBtn.className = "pillBtn";
    signupBtn.textContent = "Sign up";
    signupBtn.onclick = () => location.href = "/auth/signup";

    row.appendChild(nameInput);
    row.appendChild(saveBtn);

    if(isGuest){
      row.appendChild(loginBtn);
      row.appendChild(signupBtn);
    }

    card.appendChild(title);
    card.appendChild(sub);
    card.appendChild(row);

    welcomeMount.innerHTML = "";
    welcomeMount.appendChild(card);

    // Bot hello uses name if available
    const greetName = (name || "").trim();
    if(greetName){
      addMsg(`Hi ${greetName}! What can I get you today?`, "bot");
    }else{
      addMsg("Hi! What can I get you today?", "bot");
    }
  }

  async function sendMessage(raw){
    const text = (raw ?? inputEl.value ?? "").trim();
    if(!text) return;

    inputEl.value = "";
    addMsg(text, "user");

    if(isGreeting(text)){
      addMsg("Hey! 👋 What can I get you today? You can say “menu” or type items like “coke + spring rolls”.", "bot");
      inputEl.focus();
      return;
    }

    setSending(true);
    try{
      const data = await apiChat(text);
      addMsg(data.reply || "(no reply)", "bot");
      renderSummary(data.summary || "");
    }catch(e){
      addMsg("Sorry, something went wrong. Try again in a second.", "bot");
      console.error(e);
    }finally{
      setSending(false);
      inputEl.focus();
      scrollToBottom();
    }
  }

  // Topbar actions
  document.getElementById("menuBtn").addEventListener("click", () => sendMessage("menu"));
  document.getElementById("basketBtn").addEventListener("click", () => {
    window.location.href = `/r/${slug}/basket`;
  });

  sendBtn.addEventListener("click", () => sendMessage());
  inputEl.addEventListener("keydown", (e) => {
    if(e.key === "Enter") sendMessage();
  });

  // iOS keyboard handling
  (function keyboardFix(){
    const root = document.documentElement;
    function update(){
      const vv = window.visualViewport;
      if(!vv){ root.style.setProperty("--kb","0px"); return; }
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      root.style.setProperty("--kb", kb + "px");
      scrollToBottom();
    }
    if(window.visualViewport){
      visualViewport.addEventListener("resize", update);
      visualViewport.addEventListener("scroll", update);
    }
    window.addEventListener("resize", update);
    update();
  })();

  // Boot
  (async function init(){
    // Always show the welcome card immediately (guest fallback)
    renderWelcomeCard({ is_guest: true, name: "" });

    try{
      const me = await apiMe();
      // Re-render with real profile if endpoint works
      renderWelcomeCard(me);
    }catch(e){
      console.warn("No /me endpoint yet (showing guest welcome):", e);
    }

    inputEl.focus();
  })();
</script>
</body>
</html>
