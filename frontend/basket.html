<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Basket</title>
  <style>
    :root{
      --bg:#0b0c0f;
      --text:#f9fafb;
      --muted:#a1a1aa;
      --line:rgba(255,255,255,.10);
      --chipBg:rgba(255,255,255,.08);
      --primary:#2b6cff;
      --shadow:0 12px 40px rgba(0,0,0,.35);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
    }
    header{
      padding:12px 16px 10px;
      border-bottom:1px solid var(--line);
      position:sticky; top:0;
      background:var(--bg);
      z-index:10;
    }
    .topbar{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
    }
    .iconBtn{
      font-size:13px;
      color:var(--text);
      border:1px solid var(--line);
      background:var(--chipBg);
      padding:8px 12px;
      border-radius:999px;
      cursor:pointer;
      width:fit-content;
    }
    #backBtn{ justify-self:start; }
    #chatBtn{ justify-self:end; }
    .title{
      justify-self:center;
      font-weight:800;
      letter-spacing:-0.3px;
    }

    main{ max-width:880px; margin:0 auto; padding:16px; }
    .card{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:12px;
      margin-bottom:12px;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .name{ font-weight:700; }
    .sub{ color:var(--muted); font-size:13px; margin-top:4px; }

    .qty{
      display:flex; align-items:center; gap:10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      border-radius:999px;
      padding:6px 10px;
    }
    .qty button{
      border:0;
      background:transparent;
      color:var(--text);
      font-size:18px;
      cursor:pointer;
      padding:2px 8px;
    }
    .trash{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
    }

    .footer{
      position:sticky;
      bottom:0;
      background:linear-gradient(to top, rgba(11,12,15,1), rgba(11,12,15,.75));
      padding:14px 0 calc(14px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line);
      margin-top:18px;
    }
    .totalRow{
      display:flex; justify-content:space-between; align-items:center;
      padding:0 16px;
      font-size:16px;
      font-weight:800;
    }
    .actions{
      display:flex; gap:10px;
      padding:12px 16px 0;
    }
    .primary{
      flex:1;
      border:0;
      background:var(--primary);
      color:#fff;
      border-radius:14px;
      padding:12px 14px;
      font-weight:800;
      cursor:pointer;
    }
    .ghost{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      cursor:pointer;
    }
    .empty{ color:var(--muted); padding:24px 4px; text-align:center; }
  </style>
</head>
<body>
<header>
  <div class="topbar">
    <button id="backBtn" class="iconBtn">Menu</button>
    <div class="title" id="title">Basket</div>
    <button id="chatBtn" class="iconBtn">Chat</button>
  </div>
</header>

<main>
  <div id="list"></div>

  <div class="footer">
    <div class="totalRow">
      <div>Total</div>
      <div id="total">£0.00</div>
    </div>
    <div class="actions">
      <button id="clearBtn" class="ghost">Clear</button>
      <button id="confirmBtn" class="primary">Confirm</button>
    </div>
  </div>
</main>

<script>
  const parts = location.pathname.split("/").filter(Boolean);
  const slug = (parts.length >= 2 && parts[0] === "r") ? parts[1] : "unknown";

  const listEl = document.getElementById("list");
  const totalEl = document.getElementById("total");
  document.getElementById("title").textContent = `Basket · ${slug}`;

  document.getElementById("chatBtn").addEventListener("click", () => {
    window.location.href = `/r/${slug}`;
  });
  document.getElementById("backBtn").addEventListener("click", () => {
    window.location.href = `/r/${slug}`;
  });

  async function apiGetCart(){
    const res = await fetch(`/r/${slug}/basket`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Failed to load cart");
    return data;
  }

  async function apiUpdate(item_id, delta){
    const res = await fetch(`/r/${slug}/cart/update`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ item_id, delta })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Failed to update");
    return data;
  }

  async function apiRemove(item_id){
    const res = await fetch(`/r/${slug}/cart/remove`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ item_id })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Failed to remove");
    return data;
  }

  async function apiClear(){
    const res = await fetch(`/r/${slug}/cart/clear`, { method:"POST" });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "Failed to clear");
    return data;
  }

  function money(cur, n){
    try{ return `${cur}${Number(n).toFixed(2)}`; }catch{ return `${cur}${n}`; }
  }

  function render(cart){
    const items = cart.items || [];
    const cur = cart.currency_symbol || "£";
    totalEl.textContent = money(cur, cart.total || 0);

    listEl.innerHTML = "";

    if(items.length === 0){
      const d = document.createElement("div");
      d.className = "empty";
      d.textContent = "Your basket is empty.";
      listEl.appendChild(d);
      return;
    }

    for(const it of items){
      const card = document.createElement("div");
      card.className = "card";

      const top = document.createElement("div");
      top.className = "row";

      const left = document.createElement("div");
      const name = document.createElement("div");
      name.className = "name";
      name.textContent = it.name || "Item";
      const sub = document.createElement("div");
      sub.className = "sub";
      sub.textContent = `${money(cur, it.base_price)} each · Line: ${money(cur, it.line_total)}`;
      left.appendChild(name);
      left.appendChild(sub);

      const right = document.createElement("div");
      right.style.display = "flex";
      right.style.alignItems = "center";
      right.style.gap = "10px";

      const qty = document.createElement("div");
      qty.className = "qty";

      const minus = document.createElement("button");
      minus.textContent = "–";
      minus.addEventListener("click", async () => {
        const updated = await apiUpdate(it.item_id, -1);
        render(updated);
      });

      const q = document.createElement("div");
      q.textContent = String(it.qty || 1);
      q.style.minWidth = "20px";
      q.style.textAlign = "center";

      const plus = document.createElement("button");
      plus.textContent = "+";
      plus.addEventListener("click", async () => {
        const updated = await apiUpdate(it.item_id, +1);
        render(updated);
      });

      qty.appendChild(minus);
      qty.appendChild(q);
      qty.appendChild(plus);

      const trash = document.createElement("button");
      trash.className = "trash";
      trash.textContent = "Remove";
      trash.addEventListener("click", async () => {
        const updated = await apiRemove(it.item_id);
        render(updated);
      });

      right.appendChild(qty);
      right.appendChild(trash);

      top.appendChild(left);
      top.appendChild(right);
      card.appendChild(top);
      listEl.appendChild(card);
    }
  }

  document.getElementById("clearBtn").addEventListener("click", async () => {
    const updated = await apiClear();
    render(updated);
  });

  document.getElementById("confirmBtn").addEventListener("click", async () => {
    // simplest: go back to chat and send "confirm" via your existing flow
    window.location.href = `/r/${slug}#confirm`;
  });

  (async function init(){
    const cart = await apiGetCart();
    render(cart);
  })();
</script>
</body>
</html>
